<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="text-primary">
                Resume ATS Analyzer
            </h2>

            <h5 class="text-secondary">
                Administrator Dashboard
            </h5>

        </div>

        <a href="/logout"
           class="btn btn-danger">
            Logout
        </a>

    </div>

    <!-- Summary -->

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <div class="row text-center">

                <div class="col-md-4">

                    <h6>Total Resumes</h6>

                    <h2 class="text-primary"
                        th:text="${#lists.size(resumes)}">
                    </h2>

                </div>

                <div class="col-md-4">

                    <h6>Dashboard</h6>

                    <h2 class="text-success">
                        Admin
                    </h2>

                </div>

                <div class="col-md-4">

                    <h6>Status</h6>

                    <h2 class="text-info">
                        Active
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Top Buttons -->
<div class="mb-4">

    <a href="/upload" class="btn btn-primary">
            Upload Resume
        </a>

    <a href="/admin/resumes"
       class="btn btn-secondary">
        My Resumes
    </a>

    <a href="/admin/analytics"
       class="btn btn-warning">
        Analytics
    </a>

    <a href="/admin/feedback-list"
       class="btn btn-info">
        Feedback History
    </a>

    <a href="/admin/export/csv"
       class="btn btn-success">
        Export CSV
    </a>

    <a href="/admin/export/pdf"
       class="btn btn-danger">
        Export PDF
    </a>

</div>

    <!-- Search -->

    <form th:action="@{/admin/search}"
          method="get"
          class="row g-2 mb-4">

        <div class="col-md-10">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search by Name, Email or Skills">

        </div>

        <div class="col-md-2">

            <button class="btn btn-primary w-100">

                Search

            </button>

        </div>

    </form>

    <!-- Resume Table -->

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h5 class="mb-0">

                Resume Database

            </h5>

        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered align-middle">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th width="220">

                        Actions

                    </th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(resumes)}">

                    <td colspan="4"
                        class="text-center text-muted">

                        No resumes available.

                    </td>

                </tr>

                <tr th:each="resume : ${resumes}">

                    <td th:text="${resume.id}"></td>

                    <td th:text="${resume.name}"></td>

                    <td th:text="${resume.email}"></td>

                    <td>

                        <a th:href="@{'/admin/update/' + ${resume.id}}"
                           class="btn btn-primary btn-sm">

                            Edit

                        </a>

                        <a th:href="@{'/admin/delete/' + ${resume.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this resume?')">

                            Delete

                        </a>
                        <a th:href="@{'/jobs?resumeId=' + ${resume.id}}"
                           class="btn btn-success btn-sm">
                            Analyze Resume
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
