<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body{
            background:#f4f6f9;
        }

        .signup-card{
            margin-top:70px;
            border-radius:15px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow signup-card">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>

                    <form th:action="@{/signup}" method="post">

                        <div class="form-group">
                            <label>Username</label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Email</label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Password</label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Role</label>

                            <select name="role"
                                    class="form-control">

                                <option value="USER">
                                    USER
                                </option>

                                <option value="ADMIN">
                                    ADMIN
                                </option>

                            </select>
                        </div>

                        <button type="submit"
                                class="btn btn-success btn-block">
                            Sign Up
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/login}">
                            Already have an account? Login
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
