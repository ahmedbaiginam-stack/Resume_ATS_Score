<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resume Analysis Result</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Resume Analysis Result</h3>
        </div>

        <div class="card-body">

            <h4>
                ATS Score :
                <span class="badge bg-success"
                      th:text="${result.score + '%'}"></span>
            </h4>

            <hr>

            <h5>✅ Matched Skills</h5>

            <div th:if="${#lists.isEmpty(result.matchedSkills)}">
                <p class="text-muted">No matched skills found.</p>
            </div>

            <div th:unless="${#lists.isEmpty(result.matchedSkills)}">
                <span class="badge bg-success me-1"
                      th:each="skill : ${result.matchedSkills}"
                      th:text="${skill}">
                </span>
            </div>

            <hr>

            <h5>❌ Missing Skills</h5>

            <div th:if="${#lists.isEmpty(result.missingSkills)}">
                <p class="text-success">No missing skills.</p>
            </div>

            <div th:unless="${#lists.isEmpty(result.missingSkills)}">
                <span class="badge bg-danger me-1"
                      th:each="skill : ${result.missingSkills}"
                      th:text="${skill}">
                </span>
            </div>

            <hr>

            <h5>🤖 AI Feedback</h5>

            <div class="alert alert-info">
                <p style="white-space: pre-line;"
                   th:text="${result.feedback}">
                </p>
            </div>

        </div>

        <div class="card-footer">

            <a sec:authorize="hasRole('USER')"
           href="/user/dashboard"
           class="btn btn-primary">

            ← Return to User Dashboard

        </a>

        <!-- ADMIN -->

        <a sec:authorize="hasRole('ADMIN')"
           href="/admin/dashboard"
           class="btn btn-dark">

            ← Return to Admin Dashboard

        </a>

            <a href="/user/analytics"
               class="btn btn-primary">
                View Analytics
            </a>

        </div>

    </div>

</div>

</body>
</html>
