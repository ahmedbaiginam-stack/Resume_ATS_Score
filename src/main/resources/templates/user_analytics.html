<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Analytics</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">
        📊 User Analytics Dashboard
    </h2>

    <!-- No Data -->
    <div th:if="${analytics.empty}" class="alert alert-warning text-center">
        <h5>No feedback history found.</h5>
        <p>Analyze your first resume to see analytics.</p>

        <a href="/user/dashboard" class="btn btn-primary">
            Back to Dashboard
        </a>
    </div>

    <!-- Analytics -->
    <div th:unless="${analytics.empty}">

        <div class="card shadow p-4 mb-4">

            <div class="row text-center">

                <div class="col-md-6">
                    <h5>Total Resumes</h5>
                    <h2 class="text-primary"
                        th:text="${analytics.totalResumes}">
                    </h2>
                </div>

                <div class="col-md-6">
                    <h5>Average ATS Score</h5>
                    <h2 class="text-success"
                        th:text="${analytics.averageScore + '%'}">
                    </h2>
                </div>

            </div>

        </div>

        <div class="row">

            <!-- Matched Skills -->
            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">
                        Top Matched Skills
                    </div>

                    <ul class="list-group list-group-flush">

                        <li class="list-group-item"
                            th:each="entry : ${analytics.topMatchedSkills}"
                            th:text="${entry.key + ' (' + entry.value + ')'}">
                        </li>

                    </ul>

                </div>

            </div>

            <!-- Missing Skills -->
            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-header bg-danger text-white">
                        Skills to Improve
                    </div>

                    <ul class="list-group list-group-flush">

                        <li class="list-group-item"
                            th:each="entry : ${analytics.topMissingSkills}"
                            th:text="${entry.key + ' (' + entry.value + ')'}">
                        </li>

                    </ul>

                </div>

            </div>

        </div>

        <div class="text-center mt-4">

            <a href="/user/dashboard"
               class="btn btn-primary">
                ← Back to Dashboard
            </a>

        </div>

    </div>

</div>

</body>
</html>
