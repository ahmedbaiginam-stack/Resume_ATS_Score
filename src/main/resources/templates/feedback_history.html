<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Feedback History</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        .skill-tag{
            margin:3px;
            font-size:13px;
        }
    </style>

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Resume Feedback History
    </h2>

    <!-- No Feedback -->
    <div th:if="${#lists.isEmpty(feedbackList)}"
         class="alert alert-warning text-center">

        No feedback available for this resume.

    </div>

    <!-- Feedback Table -->
    <div th:unless="${#lists.isEmpty(feedbackList)}">

        <table class="table table-bordered table-hover bg-white">

            <thead class="table-dark">

            <tr>
                <th>Resume ID</th>
                <th>Job ID</th>
                <th>ATS Score</th>
                <th>Matched Skills</th>
                <th>Missing Skills</th>
                <th>AI Feedback</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="item : ${feedbackList}">

                <td th:text="${item.resumeId}"></td>

                <td th:text="${item.jobId}"></td>

                <td>

                    <span th:if="${item.score>=80}"
                          class="badge bg-success"
                          th:text="${item.score + '%'}"></span>

                    <span th:if="${item.score>=60 && item.score<80}"
                          class="badge bg-primary"
                          th:text="${item.score + '%'}"></span>

                    <span th:if="${item.score>=40 && item.score<60}"
                          class="badge bg-warning text-dark"
                          th:text="${item.score + '%'}"></span>

                    <span th:if="${item.score<40}"
                          class="badge bg-danger"
                          th:text="${item.score + '%'}"></span>

                </td>

                <td>

                    <span th:each="skill : ${item.matchedSkills}"
                          class="badge bg-success skill-tag"
                          th:text="${skill}">
                    </span>

                </td>

                <td>

                    <span th:each="skill : ${item.missingSkills}"
                          class="badge bg-danger skill-tag"
                          th:text="${skill}">
                    </span>

                </td>

                <td style="width:350px;"
                    th:text="${item.feedback}">
                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <hr>

    <div class="text-center">

        <!-- USER -->

        <a sec:authorize="hasRole('USER')"
           href="/user/dashboard"
           class="btn btn-primary">

            ← Return to User Dashboard

        </a>

        <!-- ADMIN -->

        <a sec:authorize="hasRole('ADMIN')"
           href="/admin/dashboard"
           class="btn btn-dark">

            ← Return to Admin Dashboard

        </a>

    </div>

</div>

</body>
</html>
