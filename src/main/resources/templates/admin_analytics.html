<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Admin Analytics</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center text-primary mb-4">
📈 Admin Analytics Dashboard
</h2>

<div th:if="${analytics.empty}" class="alert alert-warning text-center">

<h4>No Analytics Available</h4>

<p>No resume has been analyzed yet.</p>

<a href="/admin/dashboard" class="btn btn-primary">

Back to Dashboard

</a>

</div>

<div th:unless="${analytics.empty}">

<div class="card shadow p-4 mb-4">

<div class="row text-center">

<div class="col-md-6">

<h5>Total Resumes</h5>

<h2 class="text-primary"
th:text="${analytics.totalResumes}">
</h2>

</div>

<div class="col-md-6">

<h5>Average ATS Score</h5>

<h2 class="text-success"
th:text="${analytics.averageScore + '%'}">
</h2>

</div>

</div>

</div>

<div class="row">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-success text-white">

Top Matched Skills

</div>

<table class="table table-bordered mb-0">

<thead>

<tr>

<th>Skill</th>

<th>Count</th>

</tr>

</thead>

<tbody>

<tr th:each="entry : ${analytics.topMatchedSkills}">

<td th:text="${entry.key}"></td>

<td th:text="${entry.value}"></td>

</tr>

</tbody>

</table>

</div>

</div>

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-danger text-white">

Top Missing Skills

</div>

<table class="table table-bordered mb-0">

<thead>

<tr>

<th>Skill</th>

<th>Count</th>

</tr>

</thead>

<tbody>

<tr th:each="entry : ${analytics.topMissingSkills}">

<td th:text="${entry.key}"></td>

<td th:text="${entry.value}"></td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<div class="text-center mt-4">

<a href="/admin/dashboard"
class="btn btn-primary">

← Back to Dashboard

</a>

</div>

</div>

</div>

</body>

</html>
