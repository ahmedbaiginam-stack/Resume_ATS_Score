<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Heading -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="text-primary">Resume ATS Analyzer</h2>
            <h5 class="text-secondary">
                Welcome,
                <span th:text="${#authentication.name}"></span>
            </h5>
        </div>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>

    <!-- Summary Card -->
    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <div class="row text-center">

                <div class="col-md-6">

                    <h6>Total Uploaded Resumes</h6>

                    <h2 class="text-primary"
                        th:text="${#lists.size(resumes)}">
                        0
                    </h2>

                </div>

                <div class="col-md-6">

                    <h6>Dashboard</h6>

                    <h2 class="text-success">
                        User
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Action Buttons -->

    <div class="mb-4">

        <a href="/upload" class="btn btn-primary">
            Upload Resume
        </a>

        <a href="/user/analytics" class="btn btn-warning">
            Analytics
        </a>

        <a href="/jobs" class="btn btn-success">
            Browse Jobs
        </a>
        

    </div>

    <!-- Resume Table -->

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h5 class="mb-0">
                My Uploaded Resumes
            </h5>

        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered align-middle">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Skills</th>

                    <th>Uploaded Time</th>

                    <th width="260">Actions</th>

                </tr>

                </thead>

                <tbody>

                <!-- Empty State -->

                <tr th:if="${#lists.isEmpty(resumes)}">

                    <td colspan="6"
                        class="text-center text-muted">

                        No resumes uploaded yet.

                    </td>

                </tr>

                <!-- Resume List -->

                <tr th:each="resume : ${resumes}">

                    <td th:text="${resume.id}"></td>

                    <td th:text="${resume.name}"></td>

                    <td th:text="${resume.email}"></td>

                    <td th:text="${resume.skillsText}"></td>

                    <td th:text="${#temporals.format(resume.uploadedAt,'dd-MM-yyyy HH:mm')}"></td>

                    <td>

                        <a th:href="@{'/jobs?resumeId=' + ${resume.id}}"
                           class="btn btn-success btn-sm">
                            Analyze Resume
                        </a>

                        <a th:href="@{'/my-feedback/' + ${resume.id}}"
                           class="btn btn-info btn-sm">
                            Feedback History
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
